// UI theme: catppuccin-mocha — inspired by Catppuccin Mocha (Blue accent).
// Palette: base #1e1e2e, mantle #181825, surface0 #313244, text #cdd6f4,
//          subtext0 #a6adc8, blue #89b4fa.
// Drop into <gamedir>/themes/ and apply with: theme catppuccin-mocha

// --- Console chrome (works out of the box, no assets needed) ---
seta cl_conColor "30 30 46 255"             // base   #1e1e2e  (panel)
seta con_tabColor "49 50 68 255"            // surface0 #313244 (active tab)
seta con_tabColorInactive "24 24 37 255"    // mantle #181825   (inactive tab)
seta con_accentColor "137 180 250 255"      // blue   #89b4fa   (separator + borders)
seta con_titleColor "137 180 250 255"       // blue   #89b4fa   (active tab title)
seta con_titleColorInactive "166 173 200 255" // subtext0 #a6adc8 (inactive title)
seta con_textColor "205 214 244 255"        // text   #cdd6f4   (body + prompt)
seta con_separatorHeight "2"
seta con_height "0.5"
seta con_opacity "0.95"
seta con_tabScale "1.25"
seta con_scale "1"
seta con_notifyLines "4"
seta con_notifyY "0"
seta con_notifytime "3"
seta cl_conXOffset "0"
seta con_charset "gfx/2d/bigchars"
seta con_image "console"

// --- Menu background (optional) ---
// Flatten the main-menu / sub-screen backgrounds to the Catppuccin base color.
// Needs a solid base image at q3ut4/theme/catppuccin/base.tga (a 16x16 #1e1e2e
// TGA ships with this theme). If the image is missing these lines warn and are
// skipped — the console colors above still apply. Comment them to keep UrT art.
remapShader ui/assets/ut_menuback theme/catppuccin/base
remapShader ui/assets/backscreen  theme/catppuccin/base

// Erase the default main-menu decoration (diagonal lines + arc) for a clean
// flat Catppuccin backdrop. They map to the "hidden" shader (blendFunc
// GL_ZERO GL_ONE = draws nothing) so they are TRULY transparent, not painted
// black. Needs scripts/catppuccin.shader loaded (a vid_restart after install).
// These names need the extended allowlist (ui_ prefix + the circle exact-name).
remapShader ui_lines1            theme/catppuccin/hidden   // diagonal hash lines
remapShader ui_lines2            theme/catppuccin/hidden
remapShader models/misc/circle_1 theme/catppuccin/hidden   // arc / swoosh

// --- Menu widgets ---
// Rectangular fills (angled bands, accent) use the flat swatches; the shaped
// widgets (corner, arrows, slider knob) use blend shaders from
// scripts/catppuccin.shader so their transparency is preserved.
remapShader ui/assets/tab_tr       theme/catppuccin/surface0   // menu angled band
remapShader ui/assets/tab_on_tr    theme/catppuccin/surface1   // menu angled band (subtle)
remapShader ui/assets/gradientbar2 theme/catppuccin/blue       // accent bar

// Panel corner (normal + hover)
remapShader ui/assets/angle        theme/catppuccin/angle
remapShader ui/assets/angle_on     theme/catppuccin/angle_on

// Scrollbar: track, thumb, and the four arrow buttons
remapShader ui/assets/scrollbar            theme/catppuccin/scrollbar
remapShader ui/assets/scrollbar_thumb      theme/catppuccin/scrollbar_thumb
remapShader ui/assets/scrollbar_arrow_up_a   theme/catppuccin/arrow_up
remapShader ui/assets/scrollbar_arrow_dwn_a  theme/catppuccin/arrow_dwn
remapShader ui/assets/scrollbar_arrow_left   theme/catppuccin/arrow_left
remapShader ui/assets/scrollbar_arrow_right  theme/catppuccin/arrow_right

// Slider: track + knob
remapShader ui/assets/slider2      theme/catppuccin/slider
remapShader ui/assets/sliderbutt_1 theme/catppuccin/sliderbutt

// Navigation arrows (normal + hover): back = neutral->blue, accept = green
remapShader ui/assets/backarrow      theme/catppuccin/backarrow
remapShader ui/assets/backarrow_on   theme/catppuccin/backarrow_on
remapShader ui/assets/acceptarrow    theme/catppuccin/acceptarrow
remapShader ui/assets/acceptarrow_on theme/catppuccin/acceptarrow_on
