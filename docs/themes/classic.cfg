// UI theme: classic — the original Quake 3 feel (dark blue panel, red accent).
// Uses the stock console background image (empty cl_conColor) at full opacity.
// Drop this file into <gamedir>/themes/ and apply it with: theme classic
seta cl_conColor ""
seta con_tabColor "0 0 40 255"
seta con_tabColorInactive "0 0 20 255"
seta con_accentColor "255 0 0 255"
seta con_titleColor "255 255 0 255"
seta con_titleColorInactive "255 255 255 255"
seta con_textColor "255 255 255 255"
seta con_separatorHeight "2"
seta con_height "0.5"
seta con_opacity "1"
seta con_tabScale "1.25"
seta con_scale "1"
seta con_notifyLines "4"
seta con_notifyY "0"
seta con_notifytime "3"
seta cl_conXOffset "0"
seta con_charset "gfx/2d/bigchars"
seta con_image "console"
