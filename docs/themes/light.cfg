// UI theme: light — a pale console with dark text accents.
// Drop this file into <gamedir>/themes/ and apply it with: theme light
seta cl_conColor "222 222 230 255"
seta con_tabColor "222 222 230 255"
seta con_tabColorInactive "180 180 190 255"
seta con_accentColor "40 90 200 255"
seta con_titleColor "20 20 30 255"
seta con_titleColorInactive "70 70 80 255"
seta con_textColor "25 25 35 255"
seta con_separatorHeight "2"
seta con_height "0.5"
seta con_opacity "0.92"
seta con_tabScale "1.25"
seta con_scale "1"
seta con_notifyLines "4"
seta con_notifyY "0"
seta con_notifytime "3"
seta cl_conXOffset "0"
seta con_charset "gfx/2d/bigchars"
seta con_image "console"
