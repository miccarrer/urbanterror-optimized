// UI theme: dark — the default Urban Terror Optimized console look.
// Drop this file into <gamedir>/themes/ and apply it with: theme dark
seta cl_conColor "51 51 61 255"
seta con_tabColor "51 51 61 255"
seta con_tabColorInactive "18 18 23 255"
seta con_accentColor "255 0 0 255"
seta con_titleColor "255 255 0 255"
seta con_titleColorInactive "255 255 255 255"
seta con_textColor "255 255 255 255"
seta con_separatorHeight "2"
seta con_height "0.5"
seta con_opacity "0.8"
seta con_tabScale "1.25"
seta con_scale "1"
seta con_notifyLines "4"
seta con_notifyY "0"
seta con_notifytime "3"
seta cl_conXOffset "0"

// Console font + background images (themable). Defaults shown; point them at
// your own assets (shipped in a .pk3) for a custom look.
seta con_charset "gfx/2d/bigchars"
seta con_image "console"

// Restyle 2D menu/HUD assets shipped in your theme .pk3 (UI/2D names only:
// ui/ menu/ hud/ gfx/2d/). Uncomment and adapt:
//   remapShader gfx/2d/crosshairb mytheme/crosshair
//   remapShader gfx/2d/bigchars   mytheme/font
