// Cfg-scripting test: alias, conditional exec (if), cvar lock, and time.
// Run by tests/integration/run.sh; a failing assert raises the process exit code.
//
// Note on ordering: alias/if queue their body at the FRONT of the command
// buffer (Cbuf_InsertText), so the queued commands run before the lines that
// follow them in this file — the asserts below therefore see their effects.

// --- commands are registered ---
assert_command alias
assert_command unalias
assert_command unaliasall
assert_command if
assert_command time
assert_command cvarlock
assert_command cvarunlock

// --- alias: define, then expand it and observe the side effect ---
set alias_hit 0
alias mark_hit "set alias_hit 1"
mark_hit
assert_cvar alias_hit == 1

// --- alias: redefining replaces the body ---
alias mark_hit "set alias_hit 2"
mark_hit
assert_cvar alias_hit == 2

// --- alias: multi-statement body (semicolons inside quotes) expands fully ---
set ms_a 0
set ms_b 0
alias multi "set ms_a 1; set ms_b 2"
multi
assert_cvar ms_a == 1
assert_cvar ms_b == 2

// --- alias: an alias may not shadow a real command (refused) ---
alias quit "set alias_hit 99"
assert_command quit
assert_cvar alias_hit == 2

// --- unalias: removed alias no longer expands ---
set gone_val 0
alias gone "set gone_val 1"
unalias gone
gone
assert_cvar gone_val == 0

// --- if: true condition runs the command ---
set cond 5
set if_true 0
if cond == 5 set if_true 1
assert_cvar if_true == 1

// --- if: false condition does nothing ---
set if_false 0
if cond == 99 set if_false 1
assert_cvar if_false == 0

// --- if: string operators (first operand is a cvar name) ---
set greet hello
set if_str 0
if greet eq hello set if_str 1
assert_cvar if_str == 1

// --- cvarlock: blocks console changes until unlocked ---
set locked_v 10
cvarlock locked_v
set locked_v 20
assert_cvar locked_v == 10
cvarunlock locked_v
set locked_v 30
assert_cvar locked_v == 30

// --- time: runs and stays registered (timing printed to console) ---
time echo scripting-timing-probe

quit
