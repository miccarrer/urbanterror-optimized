// Smoke test: exercises the Tier-0 assert harness and core cvar/command paths.
// Run by tests/integration/run.sh; a failing assert raises the process exit code.

// --- literal asserts (numeric + string operators) ---
assert 1 == 1
assert 2 != 3
assert 5 >= 5
assert 4 < 10
assert hello eq hello
assert hello ne world

// --- cvar get/set round-trips through the engine ---
set smoke_value 42
assert_cvar smoke_value == 42

set smoke_text urbanterror
assert_cvar smoke_text eq urbanterror

// --- cvar arithmetic / known defaults ---
seta com_maxfps 125
assert_cvar com_maxfps == 125

// --- command registration ---
assert_command quit
assert_command exec
assert_command assert_cvar

// --- cvar flags (registration correctness) ---
assert_cvar_flag com_logTimestamps TEMP
assert_cvar_flag sv_running ROM

// --- filesystem write path (homepath): writeconfig must land where FS can read it ---
writeconfig probe.cfg
assert_file probe.cfg

quit
