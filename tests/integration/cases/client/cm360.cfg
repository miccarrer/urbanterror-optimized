// cm360 — mouse sensitivity <-> cm/360 converter (client-only command).
// cm/360 = 360 * 2.54 / (m_dpi * sensitivity * m_yaw).

// command + dpi cvar are registered
assert_command cm360
assert_cvar_flag m_dpi ARCHIVE

set m_yaw 0.022

// 10.39091 cm/360 @ 800 dpi -> sensitivity ~= 5.0
set m_dpi 800
cm360 10.39091
assert_cvar sensitivity > 4.99
assert_cvar sensitivity < 5.01

// halving the DPI doubles the sensitivity for the same cm/360 (~= 10.0)
set m_dpi 400
cm360 10.39091
assert_cvar sensitivity > 9.98
assert_cvar sensitivity < 10.02

quit
