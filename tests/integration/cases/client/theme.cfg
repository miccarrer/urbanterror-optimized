// UI theme system (chrome colors + theme/themesave/themelist commands).
// Rendering is not assertable headless; this covers cvar registration, range
// clamping and the themesave -> theme round-trip (export then re-apply).

// new chrome color cvars registered with their defaults
assert_cvar con_tabColor eq "51 51 61 255"
assert_cvar con_tabColorInactive eq "18 18 23 255"
assert_cvar con_accentColor eq "255 0 0 255"
assert_cvar con_titleColor eq "255 255 0 255"
assert_cvar con_titleColorInactive eq "255 255 255 255"
assert_cvar con_textColor eq "255 255 255 255"

// Phase 2 asset cvars + remapShader command
assert_cvar con_charset eq "gfx/2d/bigchars"
assert_cvar con_image eq "console"
assert_command remapShader

// remapShader: a UI/2D prefix is accepted, a gameplay prefix is rejected (anti-cheat).
// Neither should error the config (null renderer no-ops the actual remap); reaching
// quit 0 proves both paths are crash-free.
remapShader gfx/2d/bigchars gfx/2d/bigchars
remapShader textures/foo bar
// extended allowlist: ui_ prefix + the circle exact-name are accepted; gameplay
// model/texture paths stay rejected. All crash-free either way.
remapShader ui_lines1 gfx/2d/bigchars
remapShader models/misc/circle_1 gfx/2d/bigchars
remapShader models/players/foo bar

// con_separatorHeight clamps to 1-8
assert_cvar con_separatorHeight == 2
set con_separatorHeight 99
assert_cvar con_separatorHeight == 8
set con_separatorHeight 0
assert_cvar con_separatorHeight == 1
set con_separatorHeight 2

// theme commands are registered
assert_command theme
assert_command themesave
assert_command themelist

// round-trip: change a color + register an asset remap, export both, change
// again, re-apply, verify restore. theme uses Cbuf_InsertText so the exec'd
// file applies before the next asserts. themesave must also write the remap
// line, and re-exec'ing it (with the remap) must stay crash-free.
set con_accentColor "0 128 255 255"
remapShader gfx/2d/bigchars gfx/2d/bigchars2
themesave testtheme
set con_accentColor "11 22 33 255"
theme testtheme
assert_cvar con_accentColor eq "0 128 255 255"
assert_cvar cl_theme eq "testtheme"

// applying a missing theme leaves the current look unchanged (no crash)
theme no_such_theme_xyz
assert_cvar con_accentColor eq "0 128 255 255"

quit
