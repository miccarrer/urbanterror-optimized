// console UX (cfg-scripting Lot 2) — height, opacity, notify cvars (client-only).
// Rendering itself is not assertable headless; this covers registration + range
// clamping (Cvar_CheckRange) of the four cvars. Visual checks are done in-game.

// the four cvars are registered (default values)
assert_cvar con_height == 0.5
assert_cvar con_opacity == 0.8
assert_cvar con_notifyLines == 4
assert_cvar con_notifyY == 0

// cl_conColor defaults to the active-tab color (R G B A, 0-255)
assert_cvar cl_conColor eq "51 51 61 255"

// con_height clamps to 0.1-1.0
set con_height 5
assert_cvar con_height == 1
set con_height 0
assert_cvar con_height == 0.1
set con_height 0.8
assert_cvar con_height == 0.8

// con_opacity clamps to 0-1
set con_opacity 2
assert_cvar con_opacity == 1
set con_opacity -1
assert_cvar con_opacity == 0
set con_opacity 0.3
assert_cvar con_opacity == 0.3

// con_notifyLines clamps to 0-8
set con_notifyLines 99
assert_cvar con_notifyLines == 8
set con_notifyLines -5
assert_cvar con_notifyLines == 0

// con_notifyY clamps to 0-600
set con_notifyY 9999
assert_cvar con_notifyY == 600
set con_notifyY 100
assert_cvar con_notifyY == 100

quit
