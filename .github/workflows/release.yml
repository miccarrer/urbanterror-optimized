name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write       # required by attest-build-provenance (Sigstore signing)
  attestations: write   # publish build provenance for the release artifacts

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            arch: x86_64
          - name: linux-arm64
            os: ubuntu-22.04-arm
            arch: arm64
          - name: macos-x86_64
            os: macos-14
            arch: x86_64
          - name: macos-aarch64
            os: macos-14
            arch: aarch64
          - name: windows-x86_64
            os: windows-2022
            arch: x86_64
    steps:
      - name: Install deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install make gcc libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev

      - name: Install deps (macos)
        if: runner.os == 'macOS'
        run: brew install coreutils sdl2

      - name: Setup msys2 (windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MINGW64
          install: base-devel mingw-w64-x86_64-binutils mingw-w64-x86_64-make mingw-w64-x86_64-gcc
          path-type: minimal

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      # Single client with dynamically loaded renderers (USE_RENDERER_DLOPEN=1, the
      # engine default): ships one binary that starts in Vulkan and can fall back to
      # OpenGL at runtime (\cl_renderer opengl; \vid_restart) — no separate binary.
      - name: Build (linux)
        if: runner.os == 'Linux'
        run: |
          J=$(nproc)
          make install -j$J ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=1 RENDERER_DEFAULT=vulkan

      - name: Build (macos)
        if: runner.os == 'macOS'
        run: |
          J=$(sysctl -n hw.logicalcpu)
          make install -j$J ARCH=${{ matrix.arch }} CC=clang DESTDIR=bin INSTALL=ginstall STRIP=echo RENDERER_DEFAULT=vulkan

      - name: Build (windows/msys2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          J=$(nproc)
          make install -j$J ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=0 RENDERER_DEFAULT=vulkan

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: urbanterror-optimized-${{ matrix.name }}
          path: bin
          if-no-files-found: error
          retention-days: 5

  release:
    name: package & publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create zip archives
        run: |
          mkdir -p dist
          for d in artifacts/urbanterror-optimized-*; do
            [ -d "$d" ] || continue
            base=$(basename "$d")
            cp .github/release/BINARIES.txt "$d/BINARIES.txt"
            (cd "$d" && zip -r "../../dist/${base}.zip" .)
          done
          ls -la dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: dist/*.zip

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          body: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          generate_release_notes: true
