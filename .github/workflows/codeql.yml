name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly published CodeQL queries.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Install build deps
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev \
            libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: c-cpp
          # Query suite + vendored-code exclusions live in the config file.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: make -j"$(nproc)" USE_RENDERER_DLOPEN=0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:c-cpp"
