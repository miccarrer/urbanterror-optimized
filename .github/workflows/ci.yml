name: ci

on:
  pull_request:
    paths-ignore: ['**.md', '*.txt', '.gitignore', 'docs/**']
  push:
    branches: [main]
    paths-ignore: ['**.md', '*.txt', '.gitignore', 'docs/**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format (changed lines)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Install clang-format
        run: sudo apt-get -qq update && sudo apt-get -y install clang-format
      - name: Determine base commit
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=HEAD~1" >> "$GITHUB_OUTPUT"
          fi
      - name: Check formatting of changed C lines
        run: |
          base="${{ steps.base.outputs.sha }}"
          # Only committed, non-vendored C files; clang-format checks just their changed lines.
          files=$(git diff --name-only --diff-filter=ACM "$base" HEAD -- \
            'code/*.c' 'code/*.h' \
            ':!code/libcurl/*' ':!code/libjpeg/*' ':!code/libogg/*' \
            ':!code/libvorbis/*' ':!code/libsdl/*' ':!code/renderercommon/vulkan/*')
          if [ -z "$files" ]; then echo "No changed C files."; exit 0; fi
          echo "Checking:"; echo "$files"
          diff=$(git clang-format --diff "$base" -- $files || true)
          if [ -z "$diff" ] || printf '%s' "$diff" | grep -qE "no modified files|did not modify"; then
            echo "Formatting OK."; exit 0
          fi
          echo "$diff"
          echo "::error::clang-format violations on changed lines. Run: git clang-format"
          exit 1

  analyze:
    name: cppcheck (informational)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: sudo apt-get -qq update && sudo apt-get -y install cppcheck
      - name: Cache cppcheck analysis
        # Persists cppcheck's per-file analysis across runs; unchanged files are
        # not re-analyzed. Keyed per-commit, restoring the most recent prior cache.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cppcheck-build
          key: cppcheck-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            cppcheck-${{ runner.os }}-
      - name: Run cppcheck
        # Informational only: findings are surfaced in the log but do not fail the
        # job. The legacy base has known intentional findings (e.g. Com_Crash_f's
        # deliberate null write to test the crash handler), so --error-exitcode is
        # intentionally omitted rather than suppressing each one in upstream code.
        # --cppcheck-build-dir caches analysis (warm runs drop from ~7 min to
        # seconds). --max-configs is NOT lowered: without the build's platform
        # defines, a single config hits q_platform.h's #error and analyses nothing.
        run: |
          mkdir -p .cppcheck-build
          cppcheck --quiet -j"$(nproc)" --enable=warning,portability,performance \
            --inline-suppr --suppress=missingInclude --suppress=missingIncludeSystem \
            --cppcheck-build-dir=.cppcheck-build \
            code/qcommon code/client code/server code/botlib

  sanitizers:
    name: build (ASan+UBSan)
    runs-on: ubuntu-24.04
    steps:
      - run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: san-${{ github.job }}
      - name: Build with sanitizers
        run: |
          # EXTRA_* are appended by the Makefile (debug target), so internal
          # libs (-lm, ...) and defines/includes are preserved; -fsanitize is added.
          make debug -j$(nproc) CC="ccache gcc" USE_RENDERER_DLOPEN=0 \
            EXTRA_CFLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            EXTRA_LDFLAGS="-fsanitize=address,undefined"

  unit:
    name: unit tests (ASan+UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run unit tests
        run: make -C tests unit

  integration:
    name: integration (headless)
    runs-on: ubuntu-24.04
    steps:
      - run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: smoke-${{ github.job }}
      # Builds the dedicated server and runs the assert-driven .cfg suite headless
      # against the in-repo fixture (no game install / pk3s required).
      - name: Headless server smoke tests
        run: make smoke CC="ccache gcc"
      # Builds the client + null renderer and runs the client cases with the UI VM
      # skipped — still install-free, covering client-only subsystems.
      - name: Headless client smoke tests
        run: make smoke-client CC="ccache gcc"

  integration-asan:
    name: integration (ASan/UBSan)
    runs-on: ubuntu-24.04
    steps:
      - run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: smoke-asan-${{ github.job }}
      # Same headless server suite, but built under AddressSanitizer + UBSan so the
      # exercised paths double as a memory/UB check. Leak detection is off (the
      # engine intentionally leaves allocations for the OS to reclaim at exit).
      - name: Headless smoke under ASan/UBSan
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          make smoke CC="ccache gcc" \
            EXTRA_CFLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            EXTRA_LDFLAGS="-fsanitize=address,undefined"

  fuzz-smoke:
    name: fuzz smoke (libFuzzer)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install clang
        run: sudo apt-get -qq update && sudo apt-get -y install clang
      - name: Build fuzz targets
        run: make -C tests fuzz CC=clang
      - name: Short fuzz run on seed corpus
        run: ./tests/build/fuzz_info -runs=200000 -max_total_time=60 tests/fuzz/corpus/info

  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
          - name: macos-aarch64
            os: macos-14
          - name: windows-mingw64
            os: windows-2022
    steps:
      - name: Install deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev
      - name: Install deps (macos)
        if: runner.os == 'macOS'
        run: brew install coreutils sdl2
      - name: Setup msys2 (windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MINGW64
          install: base-devel mingw-w64-x86_64-binutils mingw-w64-x86_64-make mingw-w64-x86_64-gcc
          path-type: minimal
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: build-${{ matrix.name }}
      - name: Build (unix)
        if: runner.os != 'Windows'
        run: make -j"$(getconf _NPROCESSORS_ONLN)" CC="ccache gcc"
      - name: Build (windows/msys2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make -j$(nproc)
